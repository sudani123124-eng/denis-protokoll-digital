<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denis Protokoll</title>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

/* PRINT FIX النهائي */
@media print {
    @page {
        margin: 0;
    }
    body {
        background: white !important;
        padding: 1.5cm !important;
        margin: 0;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
    }
}
</style>
</head>

<body>

<div id="report" style="background:white;padding:20px;border-radius:10px">

<h2>Denis Protokoll</h2>

<label>اسم الموظف:</label>
<input type="text" id="name"><br><br>

<label>ملاحظات:</label><br>
<textarea id="notes" rows="4" style="width:100%"></textarea><br><br>

<!-- 📸 رفع صور -->
<input type="file" id="imageInput" accept="image/*" multiple>
<div id="images"></div>

<br>

<!-- ✍️ توقيع -->
<canvas id="signature" style="border:1px solid #000;width:100%;height:150px"></canvas>
<br>
<button onclick="clearSignature()">مسح التوقيع</button>

<br><br>

<!-- أزرار -->
<button onclick="downloadPDF()">📄 تحميل PDF مباشر</button>
<button onclick="window.print()">🖨 طباعة عادية</button>

</div>

<script>
/* ✍️ التوقيع */
const canvas = document.getElementById('signature');
const ctx = canvas.getContext('2d');

let drawing = false;

canvas.addEventListener('mousedown', () => drawing = true);
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mousemove', draw);

function draw(e) {
    if (!drawing) return;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
}

function clearSignature() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* 📸 عرض الصور */
document.getElementById('imageInput').addEventListener('change', function(e){
    const container = document.getElementById('images');
    container.innerHTML = "";

    Array.from(e.target.files).forEach(file=>{
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.style.width = "100px";
        img.style.margin = "5px";
        container.appendChild(img);
    });
});

/* 📄 PDF مباشر بدون نافذة */
function downloadPDF() {
    const element = document.getElementById('report');

    const opt = {
        margin: 0,
        filename: 'protokoll.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
