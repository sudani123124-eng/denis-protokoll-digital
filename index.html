<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denis Protokoll</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Denis Protokoll">
<meta name="theme-color" content="#3d5268">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–red: #E8394A;
–red2: #ff6b7a;
–green: #4cba6b;
–orange: #f5a623;
–pink: #f5a0a0;
–bg: #f5f0eb;
–card: #ffffff;
–border: #E2E5EC;
–text: #141518;
–muted: #8890A0;
–row-hover: #fff8f8;
}

/* ── DARK MODE ── */
body.dark-mode { –bg:#1a1a1a; –card:#2d2d2d; –border:#444; –text:#e0e0e0; –muted:#888; –row-hover:#3a2a2a; }
body.dark-mode .cell { background: #333 !important; }
body.dark-mode .card-header { background: linear-gradient(135deg,#1a2a3a,#0d1a26) !important; }
body.dark-mode .card-footer { background: #222 !important; }
body.dark-mode .col-tag { filter: brightness(0.8); }
body.dark-mode .notiz-select, body.dark-mode .time-input-direct, body.dark-mode .notiz-free { background: #3a3a3a !important; color: var(–text) !important; border-color: #555 !important; }
body.dark-mode .add-zone { background: transparent; }

/* ── DANGER ROW ── */
.proto-row.danger { border-left-color: var(–red) !important; }
.proto-row.danger .cell { border-color: rgba(232,57,74,0.4) !important; background: #fff5f5 !important; }
body.dark-mode .proto-row.danger .cell { background: #3a1a1a !important; }

/* ── SIGNATURE ── */
.sig-section { margin: 0 14px 12px; padding-top: 12px; border-top: 1.5px solid var(–border); }
.sig-title { font-family:‘Syne’,sans-serif; font-size:10px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(–muted); margin-bottom:8px; }
.sig-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.sig-box { display:flex; flex-direction:column; gap:5px; }
.sig-label { font-size:9px; font-weight:700; color:var(–muted); letter-spacing:1px; text-transform:uppercase; }
.sig-canvas-wrap { border:1.5px solid var(–border); border-radius:10px; background:white; overflow:hidden; }
.sig-canvas-wrap canvas { width:100%; height:90px; display:block; touch-action:none; }
.sig-clear { font-size:9px; font-weight:700; color:var(–muted); background:none; border:1px dashed var(–border); border-radius:6px; padding:2px 8px; cursor:pointer; transition:all 0.15s; align-self:flex-start; margin-top:3px; }
.sig-clear:hover { border-color:var(–red); color:var(–red); }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
min-height: 100vh;
padding: 24px 16px 60px;
-webkit-print-color-adjust: exact;
print-color-adjust: exact;
}

/* subtle grid background */
body::before {
content:’’; position:fixed; inset:0;
background-image: radial-gradient(circle at 1px 1px, #d4cdc6 1px, transparent 0);
background-size: 28px 28px; opacity: 0.5;
pointer-events: none; z-index: 0;
}
content:’’;
position:fixed; inset:0;
background-image: radial-gradient(circle at 1px 1px, #c8cdd8 1px, transparent 0);
background-size: 28px 28px;
opacity: 0.35;
pointer-events: none;
z-index: 0;
}

/* ── TOOLBAR ── */
.toolbar {
position: relative; z-index: 2;
max-width: 900px; margin: 0 auto 18px;
display: flex; align-items: center; justify-content: space-between;
}
.toolbar-brand {
font-family: ‘Syne’, sans-serif;
font-size: 13px; font-weight: 800;
letter-spacing: 3px; text-transform: uppercase;
color: var(–muted);
}
.toolbar-brand span { color: var(–red); }
.toolbar-right { display: flex; gap: 8px; }

.btn {
padding: 9px 20px; border-radius: 10px; border: none;
font-family: ‘DM Sans’, sans-serif; font-size: 13px; font-weight: 700;
cursor: pointer; transition: all 0.18s; letter-spacing: 0.2px;
}
.btn-red {
background: var(–red); color: white;
box-shadow: 0 4px 12px rgba(232,57,74,0.35);
}
.btn-red:hover { background: #c8102e; box-shadow: 0 6px 20px rgba(232,57,74,0.45); transform: translateY(-1px); }
.btn-ghost { background: white; color: #555; border: 1.5px solid var(–border); }
.btn-ghost:hover { background: #f8f8f8; }

/* ── CARD ── */
.card {
position: relative; z-index: 1;
max-width: 900px; margin: 0 auto;
background: var(–card);
border-radius: 24px;
box-shadow: 0 2px 0 #d0d4dc, 0 8px 40px rgba(0,0,0,0.09);
overflow: hidden;
}

/* ── CARD HEADER ── */
.card-header {
background: linear-gradient(135deg, #4a6080 0%, #3d5268 100%);
padding: 10px 18px 10px;
display: flex; align-items: center; justify-content: space-between;
gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 1px; }
.header-eyebrow {
font-size: 8px; font-weight: 700; letter-spacing: 2px;
text-transform: uppercase; color: rgba(255,200,200,0.85); margin-bottom: 1px;
}
.header-title {
font-family: ‘Syne’, sans-serif;
font-size: 19px; font-weight: 800; color: white; line-height: 1;
letter-spacing: -0.5px;
}
.header-title span { color: #ffb3b9; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.header-meta-fields { display: flex; gap: 7px; }
.header-selects { display: flex; align-items: center; gap: 7px; }

.meta-field { display: flex; flex-direction: column; gap: 2px; }
.meta-field-label {
font-size: 7px; font-weight: 700; letter-spacing: 2px;
text-transform: uppercase; color: rgba(255,255,255,0.45);
}
.meta-field-input {
font-family: ‘DM Sans’, sans-serif;
font-size: 11px; font-weight: 600; color: white;
background: rgba(255,255,255,0.1);
border: 1.5px solid rgba(255,255,255,0.18);
border-radius: 7px; padding: 4px 8px;
outline: none; width: 120px;
transition: border-color 0.2s;
}
.meta-field-input::placeholder { color: rgba(255,255,255,0.3); }
.meta-field-input:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
.proto-refresh {
background: rgba(255,255,255,0.15);
border: 1.5px solid rgba(255,255,255,0.25);
border-radius: 6px; color: white;
font-size: 12px; font-weight: 700;
width: 26px; height: 26px;
cursor: pointer; transition: all 0.15s;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}
.proto-refresh:hover { background: rgba(255,255,255,0.25); transform: rotate(180deg); }

.day-select {
font-family: ‘Syne’, sans-serif;
font-size: 12px; font-weight: 700; color: white;
background: rgba(255,255,255,0.12);
border: 1.5px solid rgba(255,255,255,0.2);
border-radius: 8px; padding: 4px 8px;
cursor: pointer; outline: none;
appearance: none; -webkit-appearance: none;
}

.date-input {
font-family: ‘DM Sans’, sans-serif;
font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.85);
background: rgba(255,255,255,0.1);
border: 1.5px solid rgba(255,255,255,0.18);
border-radius: 8px; padding: 4px 8px;
outline: none; cursor: pointer;
}

/* status dot */
.status-badge {
display: flex; align-items: center; gap: 5px;
background: rgba(76,186,107,0.12);
border: 1px solid rgba(76,186,107,0.3);
border-radius: 20px; padding: 4px 9px;
font-size: 10px; font-weight: 700; color: #4cba6b;
cursor: pointer; transition: all 0.2s; user-select: none;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4cba6b; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
.status-badge.incident { background: rgba(232,57,74,0.12); border-color: rgba(232,57,74,0.3); color: var(–red); }
.status-badge.incident .status-dot { background: var(–red); }

/* ── COL HEADERS ── */
.col-headers {
display: grid;
grid-template-columns: 120px 70px 70px 1fr;
gap: 6px; padding: 8px 14px 6px;
}
.col-tag {
border-radius: 6px; padding: 4px 0;
font-size: 10px; font-weight: 700; text-align: center;
letter-spacing: 0.5px;
}
.tag-kunde  { background: #F0F1F4; color: #666; }
.tag-beginn { background: #d4f5dc; color: #1a6630; }
.tag-ende   { background: #fde8c4; color: #7a4800; }
.tag-notiz  { background: #fde0e0; color: #8b1a1a; }

/* ── ROWS ── */
.rows-wrap {
display: flex; flex-direction: column; gap: 0;
padding: 0 14px 6px;
border-left: 3px solid transparent;
}

.proto-row {
display: grid;
grid-template-columns: 120px 70px 70px 1fr;
gap: 8px;
align-items: start;
padding: 5px 0;
border-bottom: 1px solid var(–border);
transition: background 0.15s;
border-radius: 0;
animation: rowIn 0.22s ease both;
position: relative;
}
/* ── ROW STATUS INDICATOR ── */
.proto-row { border-left: 3px solid transparent; transition: border-left-color 0.3s, background 0.15s; }
.proto-row.row-ok     { border-left-color: #4cba6b; }
.proto-row.row-warn   { border-left-color: #f5a623; }
.proto-row.row-empty  { border-left-color: #e0e0e0; }
.proto-row:hover { background: var(–row-hover); border-radius: 12px; }

/* creative: left red accent on hover */
.proto-row::before {
content: ‘’;
position: absolute;
left: -23px; top: 8px; bottom: 8px;
width: 3px; border-radius: 2px;
background: var(–red);
opacity: 0; transition: opacity 0.2s;
}
.proto-row:hover::before { opacity: 1; }

@keyframes rowIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

/* ── CELLS ── */
.cell {
border: 1.5px solid var(–border);
border-radius: 12px; background: white;
display: flex; align-items: center; justify-content: center;
padding: 5px; min-height: 46px;
overflow: visible;
transition: border-color 0.15s, box-shadow 0.15s;
}
.cell-notiz {
align-items: flex-start; flex-direction: column;
gap: 4px; padding: 6px 8px;
height: auto; min-height: 46px;
overflow: visible;
}
.cell:focus-within {
border-color: var(–red);
box-shadow: 0 0 0 3px rgba(232,57,74,0.08);
}

/* kunde */
.cell-kunde {
flex-direction: column; gap: 1px;
padding: 4px 8px;
justify-content: center;
}
.row-num {
font-size: 8px; font-weight: 700; color: var(–muted);
letter-spacing: 1px; align-self: flex-start;
}
.cell-kunde select {
font-family: ‘DM Sans’, sans-serif;
font-size: 12px; font-weight: 700; font-style: italic;
color: var(–text); border: none; background: transparent;
outline: none; cursor: pointer; width: 100%; text-align: center;
appearance: none; -webkit-appearance: none;
margin: auto 0;
}

/* time */
.cell-time {
flex-direction: column; gap: 3px; position: relative;
padding: 4px 4px;
}
.time-input-direct {
font-family: ‘DM Sans’, sans-serif;
font-size: 12px; font-weight: 600; color: var(–text);
border: 1.5px solid var(–border); border-radius: 7px;
padding: 3px 4px; background: #fafafa; outline: none;
width: 100%; text-align: center; cursor: pointer;
transition: border-color 0.15s;
}
.time-input-direct:focus { border-color: var(–red); background: white; }
.time-now-btn {
font-size: 10px; font-weight: 700; color: var(–muted);
background: none; border: 1px dashed var(–border);
border-radius: 6px; padding: 2px 7px;
cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.time-now-btn:hover { border-color: var(–red); color: var(–red); }

/* kunde custom */
.kunde-custom {
font-family: ‘DM Sans’, sans-serif;
font-size: 14px; font-weight: 700; font-style: italic;
color: var(–text);
border: none; background: transparent; outline: none;
width: 100%; text-align: center;
padding: 0; margin-top: 2px;
}
.kunde-back {
font-size: 11px; color: var(–muted); cursor: pointer;
margin-top: 2px; display: block; text-align: center;
transition: color 0.15s;
}
.kunde-back:hover { color: var(–red); }

/* notiz */
.notiz-items { display: flex; flex-direction: column; gap: 5px; width: 100%; }
.notiz-item {
display: flex; align-items: center; gap: 5px;
animation: rowIn 0.18s ease both;
width: 100%;
}
.notiz-select {
font-family: ‘DM Sans’, sans-serif;
font-size: 12px; font-weight: 600; color: var(–text);
border: 1.5px solid var(–border); border-radius: 8px;
padding: 4px 7px; background: #fafafa; outline: none;
cursor: pointer; flex: 1; min-width: 0;
transition: border-color 0.15s;
white-space: normal; word-break: break-word;
}
.notiz-select:focus { border-color: var(–red); }

.nc-wrap { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.nc-btn {
width: 18px; height: 18px; border-radius: 5px;
border: 1.5px solid var(–border); background: white;
font-size: 13px; font-weight: 700; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.12s; color: #666; line-height: 1;
}
.nc-btn.p { border-color: var(–red); color: var(–red); }
.nc-btn.p:hover { background: var(–red); color: white; }
.nc-btn.m:hover { background: #eee; }
.nc-num {
font-family: ‘Syne’, sans-serif; font-size: 11px; font-weight: 800;
min-width: 14px; text-align: center; color: var(–text);
}

.rm-btn {
background: none; border: none; color: #ccc; cursor: pointer;
font-size: 13px; line-height: 1; padding: 2px; border-radius: 4px;
transition: color 0.12s;
}
.rm-btn:hover { color: var(–red); }

.notiz-del-btn {
background: #fff0f1;
border: 1.5px solid #f5c0c4;
border-radius: 6px;
color: var(–red);
font-size: 12px;
width: 24px; height: 24px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
transition: all 0.15s;
}
.notiz-del-btn:hover { background: var(–red); color: white; border-color: var(–red); transform: scale(1.1); }

.notiz-free {
font-family: ‘DM Sans’, sans-serif; font-size: 11px; font-weight: 500;
color: var(–text); border: 1.5px solid var(–border); border-radius: 8px;
padding: 5px 8px; background: #fafafa; outline: none;
width: 100%; resize: none; min-height: 38px; transition: border-color 0.15s;
}
.notiz-free:focus { border-color: var(–red); background: white; }

.bottom-actions { display: flex; gap: 4px; margin-top: 2px; flex-wrap: wrap; }
.tiny-btn {
font-size: 9px; font-weight: 700; color: var(–muted);
background: none; border: 1.5px dashed var(–border);
border-radius: 6px; padding: 2px 7px; cursor: pointer;
transition: all 0.15s; white-space: nowrap;
}
.tiny-btn:hover { border-color: var(–red); color: var(–red); background: rgba(232,57,74,0.04); }

/* foto */
.foto-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; width: 100%; }
.foto-thumb {
width: 46px; height: 40px; border-radius: 8px; object-fit: cover;
border: 1.5px solid var(–border); cursor: zoom-in;
transition: transform 0.15s; flex-shrink: 0;
}
.foto-thumb:hover { transform: scale(1.06); }

/* ── ADD/REMOVE ROW ── */
.add-zone {
padding: 12px 20px;
display: flex; justify-content: center; align-items: center; gap: 14px;
}
.add-row-btn2 {
background: var(–red); color: white;
border: none; border-radius: 10px;
padding: 9px 22px;
font-family: ‘DM Sans’, sans-serif; font-size: 13px; font-weight: 700;
cursor: pointer; transition: all 0.15s;
box-shadow: 0 3px 10px rgba(232,57,74,0.25);
}
.add-row-btn2:hover { background: #c8102e; transform: translateY(-1px); }
.rm-row-btn {
background: white; color: #888;
border: 1.5px solid var(–border); border-radius: 10px;
padding: 9px 22px;
font-family: ‘DM Sans’, sans-serif; font-size: 13px; font-weight: 700;
cursor: pointer; transition: all 0.15s;
}
.rm-row-btn:hover { border-color: #e88; color: #e44; background: #fff5f5; }

/* ── FOOTER ── */
.card-footer {
background: #f8f9fc; border-top: 1.5px solid var(–border);
padding: 14px 24px;
display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
background: white; border: 1.5px solid var(–border);
border-radius: 20px; padding: 4px 14px;
font-size: 11px; font-weight: 700; color: #555;
display: flex; align-items: center; gap: 5px;
}
.chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(–red); }
.footer-brand {
font-family: ‘Syne’, sans-serif;
font-size: 10px; font-weight: 800; letter-spacing: 3px;
text-transform: uppercase; color: #c8ccd6;
}
.footer-brand span { color: var(–red); }

/* ── DAY PROGRESS BAR ── */
.progress-wrap {
margin-top: 10px;
display: flex; align-items: center; gap: 10px;
}
.progress-label {
font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
text-transform: uppercase; color: rgba(255,255,255,0.45);
white-space: nowrap;
}
.progress-track {
flex: 1; height: 4px; border-radius: 99px;
background: rgba(255,255,255,0.12); overflow: hidden;
}
.progress-fill {
height: 100%; border-radius: 99px;
background: linear-gradient(90deg, #ffb3b9, var(–red));
transition: width 1s linear;
}
.progress-time {
font-family: ‘Syne’, sans-serif;
font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.6);
white-space: nowrap;
}

/* ── LIVE CLOCK ── */
.live-clock {
font-family: ‘Syne’, sans-serif;
font-size: 11px; font-weight: 800;
color: rgba(255,255,255,0.5);
letter-spacing: 1px;
margin-top: 3px;
}

/* ── ROW HIGHLIGHT when notiz filled ── */
.proto-row.has-notiz .cell-notiz {
border-color: rgba(232,57,74,0.25);
background: #fffafb;
}
/* ── CREATIVE: TIME COLOR CODING ── */
.time-input-direct.t-night { color: #7c6fcd; border-color: #c4b8ff; background: #f5f3ff; }
.time-input-direct.t-day   { color: #1a6630; border-color: #81c784; background: #f0faf2; }
.time-input-direct.t-eve   { color: #b45309; border-color: #f5a623; background: #fffbf0; }

@media print {

- { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: white !important; padding: 0 !important; margin: 0; }
  body::before { display: none !important; }
  .toolbar, .add-zone, .no-print, .time-now-btn, .bottom-actions, .kunde-back, .progress-wrap, .live-clock { display: none !important; }
  .card { box-shadow: none !important; border-radius: 0 !important; width: 100% !important; max-width: 100% !important; }
  .card-header { padding: 10px 16px 8px !important; }
  .header-title { font-size: 18px !important; }
  .header-eyebrow { font-size: 7px !important; }
  .day-select, .date-input { font-size: 11px !important; padding: 3px 7px !important; }
  .status-badge { padding: 3px 8px !important; font-size: 9px !important; }
  .col-headers { padding: 8px 14px 4px !important; gap: 5px !important; }
  .col-tag { padding: 3px 0 !important; font-size: 9px !important; }
  .rows-wrap { padding: 0 14px 4px !important; }
  .proto-row { gap: 5px !important; padding: 3px 0 !important; }
  .proto-row::before { display: none !important; }
  .cell { min-height: 38px !important; padding: 4px 6px !important; border-radius: 7px !important; border-width: 1px !important; }
  .cell-kunde select, .kunde-custom { font-size: 11px !important; }
  .row-num { font-size: 7px !important; }
  .time-input-direct { border: none !important; background: transparent !important; font-size: 12px !important; padding: 0 !important; font-weight: 700 !important; }
  .notiz-select { font-size: 10px !important; padding: 2px 4px !important; border-radius: 5px !important; }
  .nc-btn { display: none !important; }
  .nc-num { font-size: 11px !important; font-weight: 800 !important; border: 1px solid #ccc; border-radius: 4px; padding: 1px 5px !important; }
  .notiz-item { gap: 4px !important; }
  .nc-num { font-size: 10px !important; }
  .notiz-free { font-size: 9px !important; min-height: 24px !important; padding: 2px 5px !important; }
  .foto-thumb { width: 32px !important; height: 28px !important; }
  .card-footer { padding: 6px 16px !important; }
  .chip { padding: 2px 8px !important; font-size: 9px !important; }
  .footer-brand { font-size: 8px !important; }
  .sig-section { margin: 0 8px 6px !important; padding-top: 8px !important; }
  .sig-canvas-wrap canvas { height: 70px !important; }
  .sig-clear { display: none !important; }
  @page { size: A4 portrait; margin: 8mm; }
  }

</style>
</head>
<body>

<!-- TOOLBAR -->

<div class="toolbar no-print">
  <div class="toolbar-brand">Denis <span>Protokoll</span> · Sicherheitsdienst</div>
  <div class="toolbar-right">
    <button class="btn btn-ghost" onclick="toggleDark()">🌙</button>
    <button class="btn btn-ghost" onclick="sendWhatsApp()" style="background:#25D366;color:white;border:none;">📲 WhatsApp</button>

<script>
const KUNDEN = ['— Standort —','Galerie','Lüneburg Parkhaus','Fuhle','Parking Millerntorplatz','Parkhaus My Falkenried'];

// ── EREIGNISSE mit Kategorien ──
const EREIGNISSE_GROUPS = [
  { label: '── Regulär ──', items: [], disabled: true },
  { label: 'Obdachlose nach draußen gebracht', items: null },
  { label: 'Fahrzeuge herausgelassen', items: null },
  { label: 'Unbefugte Person entfernt', items: null },
  { label: 'Fahrzeugschaden festgestellt', items: null },
  { label: 'Parkverstoß dokumentiert', items: null },
  { label: 'Sachschaden festgestellt – Dokumentiert', items: null },
  { label: '── Technisch ⚙️ ──', items: [], disabled: true },
  { label: 'Technischer Defekt gemeldet 🔧', items: null },
  { label: 'Defekte Beleuchtung 💡', items: null },
  { label: 'Schrankenstörung 🚧', items: null },
  { label: '── Warnung ⚠️ ──', items: [], disabled: true },
  { label: 'Sicherungsausfall ⚡', items: null },
  { label: 'Dauersignal an Schranke ⚠️', items: null },
  { label: 'Ruhestörung – Personen verwiesen', items: null },
  { label: 'Streit geschlichtet', items: null },
  { label: '── Notfall 🚨 ──', items: [], disabled: true },
  { label: 'Polizei eingetroffen – Obdachlose Person entfernt 🚨', items: null },
  { label: 'Polizei eingetroffen – Personalien aufgenommen 🚨', items: null },
  { label: 'Vandalismus gemeldet – Polizei informiert 🚨', items: null },
  { label: 'Notruf / Notfall gemeldet 🚨', items: null },
  { label: 'Rettungsdienst angefordert 🚑', items: null },
  { label: 'Diebstahl gemeldet – Polizei verständigt 🚨', items: null },
  { label: 'Rohrbruch / Wasseraustritt 💧', items: null },
  { label: 'Defekte Tür / Fenster 🚪', items: null },
  { label: 'Fahrzeug unberechtigt geparkt – Abschlepper verständigt', items: null },
  { label: 'Freitext…', items: null },
];

// Build flat EREIGNISSE list for backwards compat
const EREIGNISSE = ['— Ereignis —', ...EREIGNISSE_GROUPS.filter(g=>!g.disabled).map(g=>g.label)];

// Build select options HTML
function buildEreignisOptions(selected) {
  let html = `<option value="">— Ereignis —</option>`;
  EREIGNISSE_GROUPS.forEach(g => {
    if (g.disabled) {
      html += `<option disabled style="color:#aaa;font-size:10px;">${g.label}</option>`;
    } else {
      const sel = g.label === selected ? ' selected' : '';
      html += `<option${sel}>${g.label}</option>`;
    }
  });
  return html;
}

// ── EVENT COLOR SYSTEM ──
const EVENT_COLORS = {
  red:    ['Polizei eingetroffen – Obdachlose Person entfernt 🚨','Polizei eingetroffen – Personalien aufgenommen 🚨','Vandalismus gemeldet – Polizei informiert 🚨','Notruf / Notfall gemeldet 🚨','Rettungsdienst angefordert 🚑','Diebstahl gemeldet – Polizei verständigt 🚨','Rohrbruch / Wasseraustritt 💧','Defekte Tür / Fenster 🚪'],
  orange: ['Sicherungsausfall ⚡','Dauersignal an Schranke ⚠️','Ruhestörung – Personen verwiesen','Streit geschlichtet','Fahrzeug unberechtigt geparkt – Abschlepper verständigt'],
  blue:   ['Technischer Defekt gemeldet 🔧','Defekte Beleuchtung 💡','Schrankenstörung 🚧'],
};

function getEventColor(val) {
  if (EVENT_COLORS.red.includes(val))    return 'red';
  if (EVENT_COLORS.orange.includes(val)) return 'orange';
  if (EVENT_COLORS.blue.includes(val))   return 'blue';
  return 'none';
}

function updateNotizSelectStyle(sel) {
  const color = getEventColor(sel.value);
  sel.style.background = color === 'red' ? '#ffecec' : color === 'orange' ? '#fff8e6' : color === 'blue' ? '#e8f4ff' : '';
  sel.style.color       = color === 'red' ? '#b71c1c' : color === 'orange' ? '#7a4800' : color === 'blue' ? '#1a4a7a' : '';
  sel.style.borderColor = color === 'red' ? '#e88' : color === 'orange' ? '#f5a623' : color === 'blue' ? '#90caf9' : '';
  // update row danger
  const row = sel.closest('.proto-row');
  if (row) checkDanger(row);
  updateSummary();
}

// init date
const today = new Date();
document.getElementById('dateInput').value = today.toISOString().split('T')[0];
const DAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
document.getElementById('daySelect').value = DAYS[today.getDay()];

// Auto Protokoll-Nr — resets daily, only increments when explicitly called
function generateProtoNr(increment = true) {
  const d = today;
  const dateKey = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const datePrefix = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
  const storedKey = localStorage.getItem('denis_proto_date');
  let counter = 1;
  if (storedKey === dateKey && increment) {
    counter = parseInt(localStorage.getItem('denis_proto_seq') || '0') + 1;
  } else if (storedKey === dateKey && !increment) {
    counter = parseInt(localStorage.getItem('denis_proto_seq') || '1');
  }
  if (increment) {
    localStorage.setItem('denis_proto_date', dateKey);
    localStorage.setItem('denis_proto_seq', counter);
  }
  return `${datePrefix} – Nr. ${String(counter).padStart(3,'0')}`;
}

function refreshProtoNr() {
  const pNr = document.getElementById('protokollNr');
  if (pNr) pNr.value = generateProtoNr(true);
  saveData();
}

let rowId = 0;
const nCounts = {}; // rowId -> array of counts

// ── STATUS ──
let statusOk = true;
function toggleStatus() {
  statusOk = !statusOk;
  const b = document.getElementById('statusBadge');
  const t = document.getElementById('statusText');
  b.className = 'status-badge' + (statusOk ? '' : ' incident');
  t.textContent = statusOk ? 'Regulär' : 'Vorfall aktiv';
}

// ── INITIAL DATA (from image) ──
const INIT = [
  { k:'Lüneburg Parkhaus', b:'17:57', e:'19:13', n:[{ev:'Obdachlose nach draußen gebracht',c:1}] },
  { k:'Galerie',           b:'21:00', e:'21:35', n:[{ev:'Obdachlose nach draußen gebracht',c:1},{ev:'Fahrzeuge herausgelassen',c:1}] },
  { k:'Fuhle',             b:'21:51', e:'21:15', n:[] },
  { k:'Galerie',           b:'23:50', e:'00:00', n:[] },
  { k:'Fuhle',             b:'00:15', e:'01:00', n:[] },
  { k:'Galerie',           b:'01:30', e:'03:00', n:[{ev:'Obdachlose nach draußen gebracht',c:2}] },
  { k:'Galerie',           b:'05:42', e:'06:00', n:[] },
  { k:'Lüneburg Parkhaus', b:'06:35', e:'07:00', n:[] },
];

// ── ADD ROW ──
function addRow(data) {
  const id = ++rowId;
  nCounts[id] = [];
  const k  = data?.k  || '— Standort —';
  const bv = data?.b  || '00:00';
  const ev = data?.e  || '00:00';
  const bH = bv.split(':')[0], bM = bv.split(':')[1];
  const eH = ev.split(':')[0], eM = ev.split(':')[1];

  const div = document.createElement('div');
  div.className = 'proto-row';
  div.id = `row-${id}`;
  div.innerHTML = `
    <!-- KUNDE -->
    <div class="cell cell-kunde">
      <span class="row-num">#${String(id).padStart(2,'0')}</span>
      <select id="ksel-${id}" onchange="onKundeChange(this, ${id})">
        ${KUNDEN.map(x=>`<option${x===k?' selected':''}>${x}</option>`).join('')}
        <option value="__custom__"${!KUNDEN.includes(k)?' selected':''}>✏️ Eigener Name…</option>
      </select>
      <input class="kunde-custom" id="kcust-${id}" type="text"
        value="${!KUNDEN.includes(k) && k!=='— Standort —' ? k : ''}"
        style="display:${!KUNDEN.includes(k) && k!=='— Standort —' ? 'block':'none'}"
        oninput="updateSummary()">
      <span class="kunde-back no-print" id="kback-${id}"
        style="display:${!KUNDEN.includes(k) && k!=='— Standort —' ? 'inline':'none'}"
        onclick="resetKunde(${id})">↩</span>
    </div>

    <!-- BEGINN -->
    <div class="cell cell-time">
      <input class="time-input-direct" id="bd-${id}" type="time" value="${bv}" oninput="colorTime(this)">
      <button class="time-now-btn no-print" onclick="setNow('bd-${id}')">⏱ Jetzt</button>
    </div>

    <!-- ENDE -->
    <div class="cell cell-time">
      <input class="time-input-direct" id="ed-${id}" type="time" value="${ev}" oninput="colorTime(this)">
      <button class="time-now-btn no-print" onclick="setNow('ed-${id}')">⏱ Jetzt</button>
    </div>

    <!-- NOTIZ -->
    <div class="cell cell-notiz">
      <div class="notiz-items" id="ni-${id}"></div>
      <div class="foto-row" id="fr-${id}"></div>
      <div class="bottom-actions">
        <button class="tiny-btn" onclick="addNotiz(${id})">＋ Ereignis</button>
        <button class="tiny-btn" onclick="document.getElementById('fi-${id}').click()">📎 Foto</button>
        <button class="tiny-btn" style="color:#e88;" onclick="removeRow(${id})">✕ Zeile</button>
        <input type="file" id="fi-${id}" accept="image/*" style="display:none" onchange="addFoto(${id},this)">
      </div>
    </div>
  `;
  document.getElementById('rowsWrap').appendChild(div);

  if (data?.n) data.n.forEach(n => addNotiz(id, n.ev, n.c, n.ft||''));
  updateSummary();
}

// ── REMOVE LAST ROW ──
function removeLastRow() {
  const rows = document.querySelectorAll('.proto-row');
  if (rows.length === 0) return;
  const last = rows[rows.length - 1];
  last.style.opacity='0'; last.style.transform='translateX(20px)'; last.style.transition='all 0.2s';
  setTimeout(()=>{ last.remove(); updateSummary(); }, 200);
}

// ── REMOVE ROW ──
function removeRow(id) {
  const el = document.getElementById(`row-${id}`);
  if (el) { el.style.opacity='0'; el.style.transform='translateX(20px)'; el.style.transition='all 0.2s'; setTimeout(()=>el.remove(), 200); }
  updateSummary();
}

// ── NOTIZ ──
function addNotiz(rId, ereignis, count, freeText) {
  const ni = document.getElementById(`ni-${rId}`);
  const idx = nCounts[rId].length;
  nCounts[rId].push(count||0);
  const isFree = ereignis === 'Freitext…';

  const item = document.createElement('div');
  item.className = 'notiz-item';
  item.id = `ni-${rId}-${idx}`;
  item.innerHTML = `
    <div class="nc-wrap">
      <button class="nc-btn m" onclick="chN(${rId},${idx},-1)">−</button>
      <span class="nc-num" id="nc-${rId}-${idx}">${count||0}</span>
      <button class="nc-btn p" onclick="chN(${rId},${idx},+1)">+</button>
    </div>
    <select class="notiz-select" onchange="updateNotizSelectStyle(this);onNChange(this,${rId},${idx})">
      ${buildEreignisOptions(ereignis||'')}
    </select>
    <button class="notiz-del-btn no-print" title="Löschen" onclick="deleteNotiz(this)">🗑</button>
  `;
  ni.appendChild(item);

  const ta = document.createElement('textarea');
  ta.className = 'notiz-free';
  ta.placeholder = 'Eigener Text…';
  ta.value = freeText||'';
  ta.style.display = isFree ? 'block' : 'none';
  ni.appendChild(ta);
  updateSummary();
}

function deleteNotiz(btn) {
  const item = btn.closest('.notiz-item');
  const next = item.nextElementSibling;
  if (next && next.tagName === 'TEXTAREA') next.remove();
  item.style.opacity = '0';
  item.style.transform = 'translateX(10px)';
  item.style.transition = 'all 0.18s';
  setTimeout(() => { item.remove(); updateSummary(); }, 180);
}

function onNChange(sel, rId, idx) {
  // find next sibling textarea
  const item = document.getElementById(`ni-${rId}-${idx}`);
  const ta = item?.nextElementSibling;
  if (ta && ta.tagName==='TEXTAREA') ta.style.display = sel.value==='Freitext…' ? 'block' : 'none';
  updateSummary();
}

function chN(rId, idx, d) {
  nCounts[rId][idx] = Math.max(0, (nCounts[rId][idx]||0)+d);
  document.getElementById(`nc-${rId}-${idx}`).textContent = nCounts[rId][idx];
  updateSummary();
}

// ── RESET KUNDE TO SELECT ──
function resetKunde(id) {
  const sel  = document.getElementById(`ksel-${id}`);
  const cust = document.getElementById(`kcust-${id}`);
  const back = document.getElementById(`kback-${id}`);
  sel.value = '— Standort —';
  sel.style.display = 'block';
  cust.style.display = 'none';
  back.style.display = 'none';
  updateSummary();
}

// ── TIME: SET NOW ──
function setNow(inputId) {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const el = document.getElementById(inputId);
  if (el) el.value = `${h}:${m}`;
}

// ── KUNDE CUSTOM ──
function onKundeChange(sel, id) {
  const cust = document.getElementById(`kcust-${id}`);
  const back = document.getElementById(`kback-${id}`);
  if (sel.value === '__custom__') {
    sel.style.display = 'none';
    cust.style.display = 'block';
    back.style.display = 'inline';
    cust.focus();
  } else {
    cust.style.display = 'none';
    back.style.display = 'none';
    sel.style.display = 'block';
  }
  updateSummary();
}

// ── FOTO ──
function addFoto(rId, input) {
  if (!input.files[0]) return;
  const url = URL.createObjectURL(input.files[0]);
  const img = document.createElement('img');
  img.src = url; img.className = 'foto-thumb';
  img.title = 'Vergrößern'; img.onclick = ()=>window.open(url,'_blank');
  document.getElementById(`fr-${rId}`).appendChild(img);
}

// ── SUMMARY ──
function updateSummary() {
  const rows = document.querySelectorAll('.proto-row');
  let kC=0, vC=0;
  rows.forEach(row => {
    const sel = row.querySelector('select');
    const hasKunde = sel && sel.value !== '— Standort —';
    const hasNotiz = row.querySelectorAll('.nc-num').length > 0;
    let total = 0;
    row.querySelectorAll('.nc-num').forEach(n => { total += parseInt(n.textContent)||0; });
    vC += total;
    if (hasKunde) kC++;

    // color indicator
    row.classList.remove('row-ok','row-warn','row-empty');
    if (!hasKunde) row.classList.add('row-empty');
    else if (hasNotiz && total > 0) row.classList.add('row-warn');
    else row.classList.add('row-ok');
    checkDanger(row);
  });
  document.getElementById('chipK').textContent = kC + ' Kunden';
  document.getElementById('chipV').textContent = vC + ' Vorfälle';
  document.getElementById('chipR').textContent = rows.length + ' Zeilen';
  const rc = document.getElementById('rowCount');
  if (rc) rc.textContent = rows.length + ' Zeilen';
  saveData();
}

// ── RESET ──
function resetForm() {
  if (!confirm('Alle Einträge zurücksetzen?')) return;
  localStorage.removeItem('denis_protokoll');
  document.getElementById('rowsWrap').innerHTML = '';
  rowId = 0;
  Object.keys(nCounts).forEach(k=>delete nCounts[k]);
  INIT.forEach(d=>addRow(d));
  const pNr = document.getElementById('protokollNr');
  if (pNr) pNr.value = generateProtoNr();
}

// ── CREATIVE: COLOR TIME INPUTS ──
function colorTime(input) {
  const val = input.value;
  if (!val) return;
  const h = parseInt(val.split(':')[0]);
  input.classList.remove('t-night','t-day','t-eve');
  if (h >= 6  && h < 17) input.classList.add('t-day');
  else if (h >= 17 && h < 22) input.classList.add('t-eve');
  else input.classList.add('t-night');
}

// ── DARK MODE ──
function toggleDark() {
  document.body.classList.toggle('dark-mode');
  localStorage.setItem('denis_dark', document.body.classList.contains('dark-mode') ? '1' : '0');
}
if (localStorage.getItem('denis_dark') === '1') document.body.classList.add('dark-mode');

// ── WHATSAPP ──
function sendWhatsApp() {
  const rows = document.querySelectorAll('.proto-row');
  const nr  = document.getElementById('protokollNr')?.value || '—';
  const ma  = document.getElementById('mitarbeiterName')?.value || '—';
  const dat = document.getElementById('dateInput')?.value || '—';
  const day = document.getElementById('daySelect')?.value || '—';
  let text = `🛡 *Denis Protokoll*\n`;
  text += `📋 Nr: ${nr}\n👤 ${ma}\n📅 ${day}, ${dat}\n\n`;
  rows.forEach((row, i) => {
    const ksel  = row.querySelector('select');
    const kcust = row.querySelector('.kunde-custom');
    const isCustom = kcust && kcust.style.display !== 'none';
    const kunde = isCustom ? kcust.value : (ksel ? ksel.value : '—');
    const bd = row.querySelector('[id^="bd-"]')?.value || '—';
    const ed = row.querySelector('[id^="ed-"]')?.value || '—';
    const notizen = [];
    row.querySelectorAll('.notiz-select').forEach(s => { if(s.value !== '— Ereignis —') notizen.push(s.value); });
    if (kunde && kunde !== '— Standort —') {
      text += `${i+1}. *${kunde}* (${bd}–${ed})\n`;
      notizen.forEach(n => text += `   • ${n}\n`);
    }
  });
  window.open('https://wa.me/?text=' + encodeURIComponent(text));
}

// ── DANGER ROW ──
const DANGER_EVENTS = ['Polizei eingetroffen – Obdachlose Person entfernt','Polizei eingetroffen – Personalien aufgenommen','Vandalismus gemeldet – Polizei informiert','Notruf / Notfall gemeldet','Rettungsdienst angefordert','Diebstahl gemeldet – Polizei verständigt','Streit geschlichtet','Ruhestörung – Personen verwiesen'];

function checkDanger(row) {
  const hasDanger = Array.from(row.querySelectorAll('.notiz-select')).some(s => DANGER_EVENTS.includes(s.value));
  row.classList.toggle('danger', hasDanger);
}

// ── SIGNATURE PADS ──
let sigPad1, sigPad2;
function initSignatures() {
  const c1 = document.getElementById('sig1');
  const c2 = document.getElementById('sig2');
  if (c1) sigPad1 = new SignaturePad(c1, { penColor: '#141518', backgroundColor: 'white' });
  if (c2) sigPad2 = new SignaturePad(c2, { penColor: '#141518', backgroundColor: 'white' });
}


function saveData() {
  try {
    const rows = document.querySelectorAll('.proto-row');
    const data = {
      day:         document.getElementById('daySelect').value,
      date:        document.getElementById('dateInput').value,
      protokollNr: document.getElementById('protokollNr')?.value || '',
      mitarbeiter: document.getElementById('mitarbeiterName')?.value || '',
      status:      statusOk,
      rows: []
    };
    rows.forEach(row => {
      const id = row.id.replace('row-','');
      const ksel  = document.getElementById(`ksel-${id}`);
      const kcust = document.getElementById(`kcust-${id}`);
      const bd    = document.getElementById(`bd-${id}`);
      const ed    = document.getElementById(`ed-${id}`);
      const ni    = document.getElementById(`ni-${id}`);

      const isCustom = kcust && kcust.style.display !== 'none';
      const kunde = isCustom ? kcust.value : (ksel ? ksel.value : '— Standort —');

      const notizen = [];
      if (ni) {
        ni.querySelectorAll('.notiz-item').forEach(item => {
          const sel = item.querySelector('.notiz-select');
          const num = item.querySelector('.nc-num');
          const ta  = item.nextElementSibling;
          notizen.push({
            ev: sel ? sel.value : '',
            c:  num ? parseInt(num.textContent)||0 : 0,
            ft: (ta && ta.tagName==='TEXTAREA') ? ta.value : ''
          });
        });
      }
      data.rows.push({
        k: kunde,
        b: bd ? bd.value : '00:00',
        e: ed ? ed.value : '00:00',
        n: notizen
      });
    });
    localStorage.setItem('denis_protokoll', JSON.stringify(data));
  } catch(e) {}
}

function loadData() {
  try {
    const saved = localStorage.getItem('denis_protokoll');
    if (!saved) return false;
    const data = JSON.parse(saved);
    if (data.day)         document.getElementById('daySelect').value = data.day;
    if (data.date)        document.getElementById('dateInput').value = data.date;
    if (data.protokollNr) document.getElementById('protokollNr').value = data.protokollNr;
    if (data.mitarbeiter) document.getElementById('mitarbeiterName').value = data.mitarbeiter;
    if (data.status === false) toggleStatus();
    if (data.rows && data.rows.length) {
      data.rows.forEach(r => addRow(r));
      return true;
    }
  } catch(e) {}
  return false;
}

// autosave every 3 seconds
setInterval(saveData, 3000);
// also save on any input change
document.addEventListener('input',  saveData);
document.addEventListener('change', saveData);


function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  const clock = document.getElementById('liveClock');
  if (clock) clock.textContent = `${h}:${m}:${s}`;

  // Nachtschicht: 19:45 → 07:00 = 675 min
  const shiftStart = 19 * 60 + 45;
  const shiftEnd   =  7 * 60 + 0;
  const shiftTotal = (24 * 60 - shiftStart) + shiftEnd; // 675 min
  const nowMins = now.getHours() * 60 + now.getMinutes();

  let elapsed = 0;
  if (nowMins >= shiftStart)      elapsed = nowMins - shiftStart;
  else if (nowMins <= shiftEnd)   elapsed = (24 * 60 - shiftStart) + nowMins;
  else                             elapsed = 0;

  const pct = Math.min(100, Math.round((elapsed / shiftTotal) * 100));
  const fill  = document.getElementById('progressFill');
  const pctEl = document.getElementById('progressPct');
  if (fill)  fill.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
}
updateClock();
setInterval(updateClock, 1000);

// ── INIT ──
const loaded = loadData();
if (!loaded) {
  INIT.forEach(d=>addRow(d));
  const pNr = document.getElementById('protokollNr');
  if (pNr && !pNr.value) pNr.value = generateProtoNr();
}

// color all time inputs on load
document.querySelectorAll('.time-input-direct').forEach(colorTime);
document.querySelectorAll('.notiz-select').forEach(updateNotizSelectStyle);
initSignatures();
</script>
